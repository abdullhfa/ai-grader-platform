<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cohort Interactive</title>
</head>
<body>
  <button id="btn">Click</button>
  <span id="out">0</span>
  <script>
    let n = 0;
    document.getElementById('btn').addEventListener('click', () => {
      n += 1;
      document.getElementById('out').textContent = String(n);
    });
  </script>
</body>
</html>
