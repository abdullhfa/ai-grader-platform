name: Staging Deploy

on:
  workflow_dispatch:
    inputs:
      skip_smoke:
        description: Skip post-deploy smoke checks
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Go-live preflight + regression gates
        run: |
          python tools/go_live_preflight.py || test $? -eq 2
          python -m pytest tests/test_pentest_hardening.py tests/test_chaos_resilience.py -q

  deploy-staging:
    needs: preflight
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Deploy staging stack
        run: |
          ARGS=()
          if [ "${{ inputs.skip_smoke }}" = "true" ]; then
            ARGS+=(--skip-smoke)
          fi
          python tools/deploy_staging.py "${ARGS[@]}"
        working-directory: .

      - name: Upload deploy record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: staging-deploy-record
          path: uploads/ops/last_staging_deploy.json
          if-no-files-found: ignore
