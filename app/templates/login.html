<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - BTEC Teacher Assistance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/background_grading.css">
    <script>
        tailwind.config = {
            theme: {
                fontFamily: {
                    'tajawal': ['Tajawal', 'sans-serif'],
                }
            }
        }
    </script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@200;300;400;500;700;800;900&display=swap');
        
        body {
            font-family: 'Tajawal', sans-serif;
        }
        
        .glass-effect {
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .gradient-bg {
            background: #1E3A8A;
        }
        
        .floating-animation {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }
        
        .pulse-glow {
            animation: pulse-glow 2s ease-in-out infinite alternate;
        }
        
        @keyframes pulse-glow {
            from {
                box-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
            }
            to {
                box-shadow: 0 0 30px rgba(45, 212, 191, 0.8);
            }
        }
        
        .fade-in-up {
            animation: fadeInUp 1s ease-out;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="font-tajawal" x-data="loginForm()">
    <!-- Background -->
    <div class="min-h-screen gradient-bg flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        
        <div class="relative max-w-md w-full space-y-8 fade-in-up">
            <div class="glass-effect rounded-xl shadow-2xl p-8">
                <div class="text-center">
                    <div class="mb-8">
                        <h1 class="text-4xl font-black text-white mb-2">BTEC</h1>
                        <h2 class="text-2xl font-bold text-teal-400">Teacher Assistance</h2>
                        <p class="text-gray-300 mt-3">مرحباً بك مرة أخرى</p>
                    </div>
                    
                    <h2 class="text-2xl font-bold text-white mb-6">
                        تسجيل الدخول
                    </h2>
                </div>
                
                <form class="space-y-6" action="/login" method="POST" @submit="isLoading = true">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-300 mb-2">
                            البريد الإلكتروني
                        </label>
                        <input 
                            id="email" 
                            name="username" 
                            type="email" 
                            autocomplete="email" 
                            required 
                            x-model="form.email"
                            class="w-full px-4 py-3 bg-white bg-opacity-10 border border-gray-300 border-opacity-30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition-all duration-300"
                            placeholder="ادخل بريدك الإلكتروني"
                        >
                    </div>
                    
                    <!-- Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-300 mb-2">
                            كلمة المرور
                        </label>
                        <div class="relative">
                            <input 
                                id="password" 
                                name="password" 
                                :type="showPassword ? 'text' : 'password'"
                                autocomplete="current-password" 
                                required 
                                x-model="form.password"
                                class="w-full px-4 py-3 bg-white bg-opacity-10 border border-gray-300 border-opacity-30 rounded-lg text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-teal-400 focus:border-transparent transition-all duration-300"
                                placeholder="ادخل كلمة المرور"
                            >
                            <button 
                                type="button"
                                @click="showPassword = !showPassword"
                                class="absolute inset-y-0 left-3 flex items-center text-gray-400 hover:text-white transition-colors"
                            >
                                <span x-show="!showPassword" class="text-xs">إظهار</span>
                                <span x-show="showPassword" class="text-xs">إخفاء</span>
                            </button>
                        </div>
                    </div>
                    
                    <!-- Remember me & Forgot password -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center">
                            <input 
                                id="remember-me" 
                                name="remember-me" 
                                type="checkbox" 
                                x-model="form.rememberMe"
                                class="h-4 w-4 text-teal-400 focus:ring-teal-400 border-gray-300 rounded bg-transparent"
                            >
                            <label for="remember-me" class="mr-2 block text-sm text-gray-300">
                                تذكرني
                            </label>
                        </div>
                        
                        <div class="text-sm">
                            <a href="#" class="font-medium text-teal-400 hover:text-teal-300 transition-colors" @click.prevent="forgotPassword">
                                نسيت كلمة المرور؟
                            </a>
                        </div>
                    </div>
                    
                    <!-- Submit Button -->
                    <div>
                        <button 
                            type="submit" 
                            :disabled="isLoading"
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-gradient-to-r from-blue-600 to-teal-500 hover:from-blue-700 hover:to-teal-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-teal-400 transform transition-all duration-300 hover:scale-105 pulse-glow disabled:opacity-50 disabled:cursor-not-allowed"
                        >
                            <span x-show="!isLoading">تسجيل الدخول</span>
                            <span x-show="isLoading" class="flex items-center">
                                جاري التحميل...
                            </span>
                        </button>
                    </div>
                    
                    <!-- Social Login -->
                    <div class="mt-6">
                        <div class="relative">
                            <div class="absolute inset-0 flex items-center">
                                <div class="w-full border-t border-gray-300 border-opacity-30"></div>
                            </div>
                            <div class="relative flex justify-center text-sm">
                                <span class="px-2 bg-transparent text-gray-400">أو</span>
                            </div>
                        </div>
                        
                        <div class="mt-6 flex justify-center">
                            <a 
                                href="/auth/google"
                                class="w-full inline-flex justify-center items-center py-2 px-4 border border-gray-300 border-opacity-30 rounded-md shadow-sm bg-white bg-opacity-10 text-sm font-medium text-gray-300 hover:bg-opacity-20 transition-all duration-300"
                            >
                                <div class="w-6 h-6 rounded-full bg-white flex items-center justify-center mr-2">
                                    <svg viewBox="0 0 24 24" width="16" height="16">
                                        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                                        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                                        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                                        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                                    </svg>
                                </div>
                                <span class="mr-2">Google</span>
                            </a>
                        </div>
                    </div>
                </form>
                
                <!-- Sign up link -->
                <div class="text-center mt-6">
                    <p class="text-gray-300">
                        ليس لديك حساب؟
                        <a href="/register" class="font-medium text-teal-400 hover:text-teal-300 transition-colors">
                            سجل الآن
                        </a>
                    </p>
                </div>
            </div>
            
            <!-- Footer -->
            <div class="text-center text-sm text-gray-400 mt-8">
                <p>© 2024 BTEC Teacher Assistance. جميع الحقوق محفوظة.</p>
            </div>
        </div>
    </div>
    
    <!-- Success/Error Modals -->
    <div x-show="showSuccessModal" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" x-transition>
        <div class="glass-effect rounded-lg p-6 mx-4 max-w-sm w-full" x-show="showSuccessModal" x-transition.scale>
            <div class="flex items-center justify-center w-12 h-12 mx-auto mb-4 bg-green-500 rounded-full">
            </div>
            <h3 class="text-lg font-semibold text-white text-center mb-2">تم تسجيل الدخول بنجاح!</h3>
            <p class="text-gray-300 text-center mb-4">سيتم توجيهك للصفحة الرئيسية...</p>
        </div>
    </div>
    
    <div x-show="showErrorModal" x-cloak class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" x-transition>
        <div class="glass-effect rounded-lg p-6 mx-4 max-w-sm w-full" x-show="showErrorModal" x-transition.scale>
            <div class="flex items-center justify-center w-12 h-12 mx-auto mb-4 bg-red-500 rounded-full">
            </div>
            <h3 class="text-lg font-semibold text-white text-center mb-2">خطأ في تسجيل الدخول</h3>
            <p class="text-gray-300 text-center mb-4" x-text="errorMessage"></p>
            <button @click="showErrorModal = false" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-4 rounded transition-colors">
                حسناً
            </button>
        </div>
    </div>

    <script>
        function loginForm() {
            return {
                form: {
                    email: '',
                    password: '',
                    rememberMe: false
                },
                showPassword: false,
                isLoading: false,
                showSuccessModal: false,
                showErrorModal: {{ 'true' if error else 'false' }},
                errorMessage: '{{ error }}',

                forgotPassword() {
                    alert('ستتم إضافة هذه الميزة قريباً...');
                }
            }
        }
    </script>
    <script src="/static/js/background_grading.js"></script>
</body>
</html>
